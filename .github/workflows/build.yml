name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      should_publish: ${{ steps.flags.outputs.should_publish }}
      version: ${{ steps.flags.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MSG="$COMMIT_MSG"
          BUILD=false
          RELEASE=false
          PUBLISH=false

          if echo "$MSG" | grep -qi "build publish"; then
            BUILD=true
            RELEASE=true
            PUBLISH=true
          elif echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          if echo "$MSG" | grep -qi "publish from release"; then
            PUBLISH=true
          fi

          echo "should_build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "should_publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "Flags: build=$BUILD release=$RELEASE publish=$PUBLISH"

  sync-gitee-code:
    name: 【Gitee码云】Sync Code Commit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Mirror to Gitee
        uses: Yikun/hub-mirror-action@v1.5
        with:
          src: github/VincentZyuApps
          dst: gitee/vincent-zyu
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "hdrt"
          force_update: true
          debug: true

  build:
    name: Build ${{ matrix.name }}
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: hdrt.exe
            asset: hdrt-windows-x86_64.exe

          - name: windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            binary: hdrt.exe
            asset: hdrt-windows-aarch64.exe

          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: hdrt
            asset: hdrt-linux-x86_64
            packages: musl-tools

          - name: linux-aarch64
            os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            binary: hdrt
            asset: hdrt-linux-aarch64
            packages: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc

          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: hdrt
            asset: hdrt-macos-x86_64

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: hdrt
            asset: hdrt-macos-aarch64

          - name: android-aarch64
            os: ubuntu-latest
            target: aarch64-linux-android
            binary: hdrt
            asset: hdrt-android-aarch64

          - name: android-x86_64
            os: ubuntu-latest
            target: x86_64-linux-android
            binary: hdrt
            asset: hdrt-android-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux cross packages
        if: matrix.packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Setup Android NDK
        if: contains(matrix.target, 'android')
        shell: bash
        run: |
          NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

          if [[ "${{ matrix.target }}" == "aarch64-linux-android" ]]; then
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
            echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
            echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> "$GITHUB_ENV"
          elif [[ "${{ matrix.target }}" == "x86_64-linux-android" ]]; then
            echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/x86_64-linux-android24-clang" >> "$GITHUB_ENV"
            echo "CC_x86_64_linux_android=${TOOLCHAIN}/x86_64-linux-android24-clang" >> "$GITHUB_ENV"
            echo "AR_x86_64_linux_android=${TOOLCHAIN}/llvm-ar" >> "$GITHUB_ENV"
          fi

      - name: Install Linux packaging tools
        if: runner.os == 'Linux' && contains(matrix.target, 'linux') && !contains(matrix.target, 'android')
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build DEB and RPM packages
        if: runner.os == 'Linux' && contains(matrix.target, 'linux') && !contains(matrix.target, 'android')
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          mkdir -p target/release renamed

          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "target/release/${{ matrix.binary }}"

          echo "Building DEB package for ${{ matrix.target }}..."
          cargo deb --target ${{ matrix.target }} --no-build

          # RPM version cannot contain '-'. Convert Cargo pre-release syntax
          # like 0.1.5-alpha.8 to RPM ordering syntax 0.1.5~alpha.8.
          RPM_VERSION="${VERSION#v}"
          RPM_VERSION=$(echo "$RPM_VERSION" | tr '-' '~')
          echo "📦 Building RPM package for ${{ matrix.target }} with rpm version ${RPM_VERSION}..."
          echo "Cargo.toml version before RPM sed: $(grep '^version' Cargo.toml)"
          sed -i "s|^version = .*|version = \"${RPM_VERSION}\"|" Cargo.toml
          cargo generate-rpm --target ${{ matrix.target }}
          git restore Cargo.toml

          echo "Built Linux packages:"
          find target -name '*.deb' -o -name '*.rpm' | sort

          for file in $(find target -name '*.deb'); do
            cp "$file" "renamed/hdrt-${{ matrix.name }}-${VERSION}.deb"
          done
          for file in $(find target -name '*.rpm'); do
            cp "$file" "renamed/hdrt-${{ matrix.name }}-${VERSION}.rpm"
          done

          ls -lh renamed/

      - name: Upload DEB artifact
        if: runner.os == 'Linux' && contains(matrix.target, 'linux') && !contains(matrix.target, 'android')
        uses: actions/upload-artifact@v4
        with:
          name: hdrt-${{ matrix.name }}-${{ needs.check.outputs.version }}.deb
          path: renamed/*.deb

      - name: Upload RPM artifact
        if: runner.os == 'Linux' && contains(matrix.target, 'linux') && !contains(matrix.target, 'android')
        uses: actions/upload-artifact@v4
        with:
          name: hdrt-${{ matrix.name }}-${{ needs.check.outputs.version }}.rpm
          path: renamed/*.rpm

      - name: Prepare artifact
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          ASSET_BASE="${{ matrix.asset }}"

          if [[ "$ASSET_BASE" == *.* ]]; then
            BASE_NAME="${ASSET_BASE%.*}"
            EXTENSION="${ASSET_BASE##*.}"
            ASSET_WITH_VERSION="${BASE_NAME}-${VERSION}.${EXTENSION}"
          else
            ASSET_WITH_VERSION="${ASSET_BASE}-${VERSION}"
          fi

          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$ASSET_WITH_VERSION"
          echo "asset_name=$ASSET_WITH_VERSION" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset_name }}
          path: ${{ env.asset_name }}

  release:
    name: Publish GitHub Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          PLAIN_VERSION="${VERSION#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          sed \
            -e "s|__REPO__|${REPO}|g" \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__PLAIN_VER__|${PLAIN_VERSION}|g" \
            -e "s|__BASE_URL__|${BASE_URL}|g" \
            .github/release_template.md > release-notes.md

      - name: Delete existing release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          gh release delete "$VERSION" --yes --cleanup-tag || true
          git push origin ":refs/tags/${VERSION}" || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          gh release create "$VERSION" \
            --title "hdrt ${VERSION}" \
            --notes-file release-notes.md \
            hdrt-*

  sync-gitee-release:
    name: 【Gitee码云】Sync Release File
    needs: [check, release, sync-gitee-code]
    if: always() && (needs.check.outputs.should_release == 'true' || needs.check.outputs.should_publish == 'true') && (needs.release.result == 'success' || needs.release.result == 'skipped') && (needs['sync-gitee-code'].result == 'success' || needs['sync-gitee-code'].result == 'skipped')
    runs-on: ubuntu-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      GITEE_OWNER: vincent-zyu
      GITEE_REPO: hdrt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get GitHub release info
        id: release_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          RELEASE_INFO=$(gh release view "$TAG" --json name,body,assets)
          echo "release_name=$(echo "$RELEASE_INFO" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_INFO" | jq -r '.body' > release_body.md
          echo "Release: $TAG"

      - name: Download GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release_info.outputs.tag }}"
          mkdir -p assets
          gh release download "$TAG" --pattern "*" --dir assets
          ls -lh assets

      - name: Create or find Gitee release
        id: gitee_release
        run: |
          TAG="${{ steps.release_info.outputs.tag }}"
          NAME="${{ steps.release_info.outputs.release_name }}"
          BODY_JSON=$(jq -R -s '.' < release_body.md)
          CURL="curl -s -k --retry 3 --retry-delay 5 --retry-all-errors"

          if $CURL --fail "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/tags/${TAG}?access_token=${GITEE_TOKEN}" > /dev/null 2>&1; then
            echo "Tag $TAG already exists on Gitee"
          else
            $CURL -X POST --header 'Content-Type: application/json;charset=UTF-8' \
              "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/tags" \
              -d "{\"access_token\":\"${GITEE_TOKEN}\",\"tag_name\":\"${TAG}\",\"refs\":\"main\",\"tag_message\":\"Release ${TAG}\"}"
          fi

          EXISTING=$($CURL "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
          RELEASE_ID=$(echo "$EXISTING" | jq -r '.id')

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            : > existing_gitee_assets.txt
            PAYLOAD=$(jq -n \
              --arg token "$GITEE_TOKEN" \
              --arg tag "$TAG" \
              --arg name "$NAME" \
              --argjson body "$BODY_JSON" \
              '{
                access_token: $token,
                tag_name: $tag,
                name: $name,
                body: $body,
                target_commitish: "main",
                prerelease: false
              }')

            RESPONSE=$($CURL -X POST --header 'Content-Type: application/json;charset=UTF-8' \
              "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases" \
              -d "$PAYLOAD")
            RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          else
            echo "$EXISTING" | jq -r '.assets[]? | (.name // .filename // .path // empty)' > existing_gitee_assets.txt
          fi

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Failed to create or find Gitee release"
            exit 1
          fi

          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      - name: Upload assets to Gitee
        run: |
          RELEASE_ID="${{ steps.gitee_release.outputs.release_id }}"

          ts() {
            echo "[$(date -u '+%H:%M:%S UTC') / $(TZ='Asia/Shanghai' date '+%H:%M:%S CST')]"
          }

          SUCCESS=0
          FAIL=0
          TOTAL=$(find assets -maxdepth 1 -type f | wc -l | tr -d ' ')
          CURRENT=0

          echo "$(ts) 📤 Uploading assets to Gitee release (ID: $RELEASE_ID)"
          echo "$(ts) 📁 Total files to process: $TOTAL"

          for FILE in assets/*; do
            [ -f "$FILE" ] || continue
            CURRENT=$((CURRENT + 1))
            FILENAME="$(basename "$FILE")"
            FILESIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null || echo 0)
            FILESIZE_H=$(numfmt --to=iec "$FILESIZE" 2>/dev/null || echo "${FILESIZE} bytes")

            echo ""
            echo "$(ts) ──── [$CURRENT/$TOTAL] $FILENAME ($FILESIZE_H, ${FILESIZE} bytes) ────"

            if grep -Fxq "$FILENAME" existing_gitee_assets.txt 2>/dev/null; then
              echo "$(ts) ✅ $FILENAME already exists on Gitee; skipping upload"
              SUCCESS=$((SUCCESS + 1))
              continue
            fi

            START_TIME=$(date +%s)
            RESPONSE=$(curl -s -k --retry 3 --retry-delay 10 --retry-all-errors \
              --max-time 1200 --connect-timeout 30 \
              -w "\n%{http_code}" \
              -X POST --header "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${FILE}" \
              "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${RELEASE_ID}/attach_files")
            CURL_EXIT=$?
            END_TIME=$(date +%s)
            ELAPSED=$((END_TIME - START_TIME))
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            echo "$(ts) 📡 curl exit=$CURL_EXIT, HTTP=$HTTP_CODE, elapsed=${ELAPSED}s"

            if [ "$CURL_EXIT" -ne 0 ]; then
              case "$CURL_EXIT" in
                28) echo "$(ts) ⏱️ TIMEOUT: curl exceeded max-time (${ELAPSED}s)" ;;
                7) echo "$(ts) 🔌 CONNECTION REFUSED: Gitee server unreachable" ;;
                56) echo "$(ts) 💥 RECEIVE ERROR: connection reset during transfer" ;;
                *) echo "$(ts) ❓ CURL ERROR $CURL_EXIT (see https://curl.se/libcurl/c/libcurl-errors.html)" ;;
              esac
              FAIL=$((FAIL + 1))
            elif echo "$BODY" | jq -e '.browser_download_url' > /dev/null; then
              URL=$(echo "$BODY" | jq -r '.browser_download_url')
              echo "$(ts) ✅ Uploaded $FILENAME in ${ELAPSED}s: $URL"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "$(ts) ⚠️ Unexpected Gitee response for $FILENAME:"
              echo "$BODY" | head -c 500
              echo ""
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "$(ts) 📊 Gitee upload summary: $SUCCESS/$TOTAL succeeded, $FAIL failed"
          [ "$FAIL" -eq 0 ]

  publish-scoop-github:
    name: Update GitHub Scoop Bucket
    needs: [check, release]
    if: always() && needs.check.outputs.should_publish == 'true' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows binaries from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          download_release_asset() {
            local output="$1"
            local url="$2"
            curl --fail --location --show-error \
              --retry 5 --retry-delay 10 --retry-all-errors \
              --connect-timeout 30 --max-time 300 \
              -o "$output" "$url"
          }

          download_release_asset "hdrt-windows-x86_64-${VERSION}.exe" "${BASE_URL}/hdrt-windows-x86_64-${VERSION}.exe"
          download_release_asset "hdrt-windows-aarch64-${VERSION}.exe" "${BASE_URL}/hdrt-windows-aarch64-${VERSION}.exe"

      - name: Generate Scoop manifest
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          SCOOP_VERSION="${VERSION#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          HASH_X64=$(sha256sum "hdrt-windows-x86_64-${VERSION}.exe" | awk '{print $1}')
          HASH_ARM64=$(sha256sum "hdrt-windows-aarch64-${VERSION}.exe" | awk '{print $1}')

          cat > hdrt.json << EOF
          {
              "version": "${SCOOP_VERSION}",
              "description": "Hardware Device Rust Ratatui: a cross-platform hardware info CLI/TUI",
              "homepage": "https://github.com/${REPO}",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "${BASE_URL}/hdrt-windows-x86_64-${VERSION}.exe",
                      "hash": "${HASH_X64}",
                      "bin": [["hdrt-windows-x86_64-${VERSION}.exe", "hdrt"]]
                  },
                  "arm64": {
                      "url": "${BASE_URL}/hdrt-windows-aarch64-${VERSION}.exe",
                      "hash": "${HASH_ARM64}",
                      "bin": [["hdrt-windows-aarch64-${VERSION}.exe", "hdrt"]]
                  }
              },
              "checkver": {
                  "github": "${REPO}"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/${REPO}/releases/download/v\$version/hdrt-windows-x86_64-v\$version.exe"
                      },
                      "arm64": {
                          "url": "https://github.com/${REPO}/releases/download/v\$version/hdrt-windows-aarch64-v\$version.exe"
                      }
                  }
              }
          }
          EOF

          cat hdrt.json

      - name: Push to scoop-bucket
        env:
          SCOOP_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"

          git clone "https://x-access-token:${SCOOP_TOKEN}@github.com/VincentZyuApps/scoop-bucket.git" scoop-repo
          mkdir -p scoop-repo/bucket
          cp hdrt.json scoop-repo/bucket/hdrt.json

          cd scoop-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/hdrt.json
          git commit -m "ci: 🍨 Update hdrt to ${VERSION}" || echo "No changes to commit"
          git push

  publish-scoop-gitee:
    name: 【Gitee码云】Update Scoop Bucket
    needs: [check, release, sync-gitee-release]
    if: always() && needs.check.outputs.should_publish == 'true' && (needs.release.result == 'success' || needs.release.result == 'skipped') && needs['sync-gitee-release'].result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows binaries from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          download_release_asset() {
            local output="$1"
            local url="$2"
            curl --fail --location --show-error \
              --retry 5 --retry-delay 10 --retry-all-errors \
              --connect-timeout 30 --max-time 300 \
              -o "$output" "$url"
          }

          download_release_asset "hdrt-windows-x86_64-${VERSION}.exe" "${BASE_URL}/hdrt-windows-x86_64-${VERSION}.exe"
          download_release_asset "hdrt-windows-aarch64-${VERSION}.exe" "${BASE_URL}/hdrt-windows-aarch64-${VERSION}.exe"

      - name: Generate Gitee Scoop manifest
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          SCOOP_VERSION="${VERSION#v}"
          GITEE_BASE_URL="https://gitee.com/vincent-zyu/hdrt/releases/download/${VERSION}"

          HASH_X64=$(sha256sum "hdrt-windows-x86_64-${VERSION}.exe" | awk '{print $1}')
          HASH_ARM64=$(sha256sum "hdrt-windows-aarch64-${VERSION}.exe" | awk '{print $1}')

          cat > hdrt.json << EOF
          {
              "version": "${SCOOP_VERSION}",
              "description": "Hardware Device Rust Ratatui: a cross-platform hardware info CLI/TUI",
              "homepage": "https://gitee.com/vincent-zyu/hdrt",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "${GITEE_BASE_URL}/hdrt-windows-x86_64-${VERSION}.exe",
                      "hash": "${HASH_X64}",
                      "bin": [["hdrt-windows-x86_64-${VERSION}.exe", "hdrt"]]
                  },
                  "arm64": {
                      "url": "${GITEE_BASE_URL}/hdrt-windows-aarch64-${VERSION}.exe",
                      "hash": "${HASH_ARM64}",
                      "bin": [["hdrt-windows-aarch64-${VERSION}.exe", "hdrt"]]
                  }
              },
              "checkver": {
                  "url": "https://gitee.com/vincent-zyu/hdrt/releases",
                  "regex": "/releases/tag/v([\\\\w.\\\\-]+)"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://gitee.com/vincent-zyu/hdrt/releases/download/v\$version/hdrt-windows-x86_64-v\$version.exe"
                      },
                      "arm64": {
                          "url": "https://gitee.com/vincent-zyu/hdrt/releases/download/v\$version/hdrt-windows-aarch64-v\$version.exe"
                      }
                  }
              }
          }
          EOF

          cat hdrt.json

      - name: Push to Gitee scoop-bucket
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"

          git clone "https://vincent-zyu:${GITEE_TOKEN}@gitee.com/vincent-zyu/scoop-bucket.git" scoop-repo
          mkdir -p scoop-repo/bucket
          cp hdrt.json scoop-repo/bucket/hdrt.json

          cd scoop-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/hdrt.json
          git commit -m "ci: 🍨 Update hdrt to ${VERSION}" || echo "No changes to commit"
          git push
